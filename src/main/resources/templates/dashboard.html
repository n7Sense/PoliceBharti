<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/head :: head('Dashboard')"></head>
<body class="bg-dark text-light">
<div th:replace="fragments/header :: header"></div>

<div class="container-fluid">
    <div class="row">
        <div class="col-md-3 col-lg-2 p-0">
            <div th:replace="fragments/sidebar :: sidebar('dashboard')"></div>
        </div>
        <div class="col-md-9 col-lg-10 p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h3 class="mb-0 fw-bold">Dashboard</h3>
                    <p class="text-secondary mb-0 small">
                        Overview of candidate statistics and status.
                    </p>
                </div>
            </div>

            <div class="row g-3 g-md-4">
                <!-- Total Uploaded Candidates -->
                <div class="col-sm-6 col-xl-4">
                    <div class="card border-0 shadow-sm dashboard-card bg-primary text-white">
                        <div class="card-body d-flex justify-content-between align-items-center">
                            <div>
                                <div class="card-title text-uppercase small mb-1">Total Uploaded Candidates</div>
                                <div class="display-6 fw-bold" th:text="${totalUploaded}">0</div>
                            </div>
                            <div class="card-icon rounded-circle">
                                <i class="bi bi-cloud-upload-fill"></i>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Total Present Candidates -->
                <div class="col-sm-6 col-xl-4">
                    <div class="card border-0 shadow-sm dashboard-card bg-success text-white">
                        <div class="card-body d-flex justify-content-between align-items-center">
                            <div>
                                <div class="card-title text-uppercase small mb-1">Total Present Candidates</div>
                                <div class="display-6 fw-bold" th:text="${totalPresent}">0</div>
                            </div>
                            <div class="card-icon rounded-circle">
                                <i class="bi bi-person-check-fill"></i>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Total Absent Candidates -->
                <div class="col-sm-6 col-xl-4">
                    <div class="card border-0 shadow-sm dashboard-card bg-danger text-white">
                        <div class="card-body d-flex justify-content-between align-items-center">
                            <div>
                                <div class="card-title text-uppercase small mb-1">Total Absent Candidates</div>
                                <div class="display-6 fw-bold" th:text="${totalAbsent}">0</div>
                            </div>
                            <div class="card-icon rounded-circle">
                                <i class="bi bi-person-x-fill"></i>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Total Approved Candidates -->
                <div class="col-sm-6 col-xl-6">
                    <div class="card border-0 shadow-sm dashboard-card bg-info text-white">
                        <div class="card-body d-flex justify-content-between align-items-center">
                            <div>
                                <div class="card-title text-uppercase small mb-1">Total Approved Candidates</div>
                                <div class="display-6 fw-bold" th:text="${totalApproved}">0</div>
                            </div>
                            <div class="card-icon rounded-circle">
                                <i class="bi bi-check2-circle"></i>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Total Rejected Candidates -->
                <div class="col-sm-6 col-xl-6">
                    <div class="card border-0 shadow-sm dashboard-card bg-secondary text-white">
                        <div class="card-body d-flex justify-content-between align-items-center">
                            <div>
                                <div class="card-title text-uppercase small mb-1">Total Rejected Candidates</div>
                                <div class="display-6 fw-bold" th:text="${totalRejected}">0</div>
                            </div>
                            <div class="card-icon rounded-circle">
                                <i class="bi bi-x-octagon-fill"></i>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<div th:replace="fragments/footer :: footer"></div>
</body>
</html>

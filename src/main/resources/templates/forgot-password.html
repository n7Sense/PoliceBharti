<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/head :: head('Forgot Password')"></head>
<body class="bg-light">
<div class="container d-flex align-items-center justify-content-center" style="min-height: 100vh;">
    <div class="card shadow-sm" style="max-width: 420px; width: 100%;">
        <div class="card-body p-4">
            <h4 class="card-title text-center mb-4">Forgot Password</h4>

            <div th:if="${infoMessage}" class="alert alert-info" th:text="${infoMessage}"></div>

            <form th:action="@{/forgot-password}" method="post" th:object="${forgotPasswordDto}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <div class="mb-3">
                    <label class="form-label">Registered Email</label>
                    <input type="email" th:field="*{email}" class="form-control" placeholder="Email"/>
                    <div class="text-danger small" th:if="${#fields.hasErrors('email')}"
                         th:errors="*{email}"></div>
                </div>

                <button class="btn btn-primary w-100" type="submit">Send Reset Link</button>
            </form>

            <div class="mt-3 text-center">
                <a th:href="@{/login}" class="small">Back to Login</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/head :: head('Physical Test')"></head>
<body class="bg-dark text-light">
<div th:replace="fragments/header :: header"></div>

<div class="container-fluid">
    <div class="row">
        <div class="col-md-3 col-lg-2 p-0">
            <div th:replace="fragments/sidebar :: sidebar('physicalTest')"></div>
        </div>
        <div class="col-md-9 col-lg-10 p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h3 class="mb-0 fw-bold">Physical Test</h3>
                    <p class="text-secondary mb-0 small">
                        Fetch candidate by Application No, capture photo and biometrics, then save.
                    </p>
                </div>
            </div>

            <div id="physicalTestAlertContainer"></div>

            <div class="row g-4">
                <!-- Candidate Details -->
                <div class="col-12 col-xl-7">
                    <div class="card border-0 shadow-sm h-100">
                        <div class="card-header bg-primary text-white d-flex align-items-center">
                            <i class="bi bi-person-vcard-fill me-2"></i>
                            <span class="fw-semibold">Candidate Details</span>
                        </div>
                        <div class="card-body bg-dark-subtle">
                            <form id="physicalTestForm" class="row g-3">
                                <div class="col-md-6">
                                    <label for="applicationNo" class="form-label fw-semibold">
                                        Application No <span class="text-danger">*</span>
                                    </label>
                                    <input type="text" class="form-control" id="applicationNo" placeholder="Enter Application No">
                                    <div class="form-text">Press Enter or Tab to fetch candidate.</div>
                                </div>

                                <div class="col-md-6">
                                    <label for="mobileNo" class="form-label fw-semibold">Mobile No</label>
                                    <input type="text" class="form-control" id="mobileNo" readonly>
                                </div>

                                <div class="col-md-6">
                                    <label for="post" class="form-label fw-semibold">Post</label>
                                    <input type="text" class="form-control" id="post" readonly>
                                </div>

                                <div class="col-md-6">
                                    <label for="gender" class="form-label fw-semibold">Gender</label>
                                    <input type="text" class="form-control" id="gender" readonly>
                                </div>

                                <div class="col-md-6">
                                    <label for="dob" class="form-label fw-semibold">DOB</label>
                                    <input type="text" class="form-control" id="dob" readonly>
                                </div>

                                <div class="col-md-6">
                                    <label for="applicationCategory" class="form-label fw-semibold">Application Category</label>
                                    <input type="text" class="form-control" id="applicationCategory" readonly>
                                </div>

                                <div class="col-12">
                                    <label for="parallelReservation" class="form-label fw-semibold">Parallel Reservation</label>
                                    <input type="text" class="form-control" id="parallelReservation" readonly>
                                </div>

                                <div class="col-12 d-flex gap-2 mt-2">
                                    <button type="button" class="btn btn-outline-light" id="resetBtn">
                                        <i class="bi bi-arrow-counterclockwise me-1"></i> Reset
                                    </button>
                                    <button type="submit" class="btn btn-success ms-auto" id="saveBtn">
                                        <i class="bi bi-check2-circle me-1"></i> Save Candidate
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="fragments/footer :: footer"></div>

<!-- Page-specific logic -->
<script th:src="@{/js/physical-test.js}"></script>
</body>
</html>

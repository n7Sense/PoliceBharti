<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/head :: head('Register')"></head>
<body class="bg-light">
<div class="container d-flex align-items-center justify-content-center" style="min-height: 100vh;">
    <div class="card shadow-sm" style="max-width: 520px; width: 100%;">
        <div class="card-body p-4">
            <h4 class="card-title text-center mb-4">Create Account</h4>

            <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

            <form th:action="@{/register}" method="post" th:object="${registrationDto}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <div class="mb-3">
                    <label class="form-label">Name</label>
                    <input type="text" th:field="*{name}" class="form-control" placeholder="Full name"/>
                    <div class="text-danger small" th:if="${#fields.hasErrors('name')}"
                         th:errors="*{name}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" th:field="*{email}" class="form-control" placeholder="Email"/>
                    <div class="text-danger small" th:if="${#fields.hasErrors('email')}"
                         th:errors="*{email}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" th:field="*{password}" class="form-control" placeholder="Password"/>
                    <div class="text-danger small" th:if="${#fields.hasErrors('password')}"
                         th:errors="*{password}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Confirm Password</label>
                    <input type="password" th:field="*{confirmPassword}" class="form-control" placeholder="Confirm password"/>
                    <div class="text-danger small" th:if="${#fields.hasErrors('confirmPassword')}"
                         th:errors="*{confirmPassword}"></div>
                    <div class="text-danger small" th:if="${#fields.hasGlobalErrors()}"
                         th:each="err : ${#fields.globalErrors()}" th:text="${err}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Role</label>
                    <select th:field="*{role}" class="form-select">
                        <option value="" disabled selected>-- Select Role --</option>
                        <option value="ROLE_CP">CP</option>
                        <option value="ROLE_DCP">DCP</option>
                        <option value="ROLE_ACP">ACP</option>
                        <option value="ROLE_EVENT_INCHARGE">Event Incharge</option>
                        <option value="ROLE_DATA_ENTRY">Data Entry</option>
                        <option value="ROLE_VAHAK">Vahak</option>
                        <option value="ROLE_DOCUMENT_VERIFICATION">Document Verification</option>
                    </select>
                    <div class="text-danger small" th:if="${#fields.hasErrors('role')}"
                         th:errors="*{role}"></div>
                </div>

                <button class="btn btn-primary w-100" type="submit">Register</button>
            </form>

            <div class="mt-3 text-center">
                <span class="small">Already have an account?</span>
                <a th:href="@{/login}" class="small">Login</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>

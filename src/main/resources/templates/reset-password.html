<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/head :: head('Reset Password')"></head>
<body class="bg-light">
<div class="container d-flex align-items-center justify-content-center" style="min-height: 100vh;">
    <div class="card shadow-sm" style="max-width: 420px; width: 100%;">
        <div class="card-body p-4">
            <h4 class="card-title text-center mb-4">Reset Password</h4>

            <div th:if="${tokenError}" class="alert alert-danger" th:text="${tokenError}"></div>
            <div th:if="${resetSuccess}" class="alert alert-success">
                Password reset successfully. You can now <a th:href="@{/login}">login</a>.
            </div>

            <form th:if="${resetPasswordDto != null}" th:action="@{/reset-password}" method="post"
                  th:object="${resetPasswordDto}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <input type="hidden" th:field="*{token}"/>

                <div class="mb-3">
                    <label class="form-label">New Password</label>
                    <input type="password" th:field="*{password}" class="form-control" placeholder="New password"/>
                    <div class="text-danger small" th:if="${#fields.hasErrors('password')}"
                         th:errors="*{password}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Confirm Password</label>
                    <input type="password" th:field="*{confirmPassword}" class="form-control" placeholder="Confirm password"/>
                    <div class="text-danger small" th:if="${#fields.hasErrors('confirmPassword')}"
                         th:errors="*{confirmPassword}"></div>
                </div>

                <button class="btn btn-primary w-100" type="submit">Reset Password</button>
            </form>

            <div class="mt-3 text-center">
                <a th:href="@{/login}" class="small">Back to Login</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
